<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ギルドへようこそ！ - へっちゃらギルド</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Shippori+Mincho:wght@500&family=Yuji+Syuku&display=swap" rel="stylesheet">
    <style>
        :root {
            --parchment: #f2e1c1;
            --dark-wood: #3e2723;
            --gold: #b08d57;
            --wine-red: #8d1b1b;
            --border-color: #5d4037;
        }

        body {
            /* 羊皮紙のようなテクスチャをCSSで再現 */
            background-color: #d7c4a5;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.2) 0%, transparent 100%),
                url("https://www.transparenttextures.com/patterns/p6.png"); /* 微細なノイズ */
            color: #3e2723;
            font-family: 'Shippori Mincho', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* 外側の装飾フレーム */
        .guild-frame {
            position: relative;
            background-color: var(--parchment);
            padding: 10px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5), inset 0 0 100px rgba(139, 69, 19, 0.2);
            border: 2px solid var(--border-color);
            max-width: 550px;
            width: 100%;
        }

        /* 四隅のテクネ・装飾（疑似要素で作成） */
        .guild-frame::before, .guild-frame::after {
            content: "✦";
            position: absolute;
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 24px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--dark-wood);
            border: 2px solid var(--gold);
        }
        .guild-frame::before { top: -10px; left: -10px; border-radius: 5px 0 20px 0; }
        .guild-frame::after { bottom: -10px; right: -10px; border-radius: 20px 0 5px 0; }

        .container {
            border: 1px solid rgba(0,0,0,0.1);
            padding: 40px 30px;
            text-align: center;
            background-image: url("https://www.transparenttextures.com/patterns/parchment.png");
        }

        .receptionist-img {
            max-width: 140px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 5px solid var(--dark-wood);
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
            background-color: white;
        }

        h1 {
            font-family: 'Cinzel', serif; /* ギルド風英文/タイトル用フォント */
            font-size: 2.2rem;
            margin-bottom: 25px;
            color: var(--wine-red);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            position: relative;
            display: inline-block;
        }

        /* 区切り線（剣や蔓のイメージ） */
        h1::after {
            content: "";
            display: block;
            width: 150%;
            height: 15px;
            left: -25%;
            position: absolute;
            bottom: -10px;
            background: radial-gradient(ellipse at center, var(--gold) 0%, transparent 70%);
            border-bottom: 1px solid var(--gold);
        }

        .description {
            text-align: left;
            line-height: 2;
            margin: 40px 0;
            font-size: 1rem;
            font-family: 'Yuji Syuku', serif; /* 少し手書き感のあるフォント */
            padding: 20px;
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            border-left: 4px solid var(--gold);
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* ボタン：ギルドの印章や看板をイメージ */
        .btn {
            display: block;
            padding: 18px 25px;
            text-decoration: none;
            font-weight: bold;
            font-family: 'Cinzel', 'Shippori Mincho', serif;
            letter-spacing: 1px;
            transition: all 0.3s;
            font-size: 1.1rem;
            border: 2px solid var(--dark-wood);
            position: relative;
            overflow: hidden;
        }

        /* 1番目：クエスト受注（メイン） */
        .btn-line {
            background-color: var(--wine-red);
            color: #fff !important;
            box-shadow: 0 4px 0 #5a1111;
        }

        /* 2番目：書庫閲覧（サブ） */
        .btn-note {
            background-color: var(--dark-wood);
            color: var(--parchment) !important;
            box-shadow: 0 4px 0 #1a0f0d;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
            filter: brightness(1.2);
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.5);
        }

        /* 小さな装飾アイコン */
        .icon {
            margin-right: 8px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<div class="guild-frame">
    <div class="container">
        <img src="assets/guild_receptionist.jpg" alt="ギルド受付嬢" class="receptionist-img">
        
        <h1>Welcome to Heccha Guild</h1>

        <div class="description">
            <span style="font-size: 1.2rem; color: var(--wine-red);">📜 冒険者への通達：</span><br><br>
            当ギルドの「通信の水晶（オープンチャット）」では、以下の秘匿情報を取り扱っております。<br><br>
            ・マスター・へちゃぷりんの「禁書（有料note）」を一部公開<br>
            ・受付嬢・おかまゆ主催の「修練場（ワークショップ）」先行案内<br>
            ・「へっちゃらんど」の最新の宴（イベント）情報<br><br>
            新米冒険者のあなたも、我らと共にインプロの荒野へ旅立ちましょう！
        </div>

        <div class="button-group">
            <a href="https://line.me/ti/g2/wDFzdXAqOzG_H0Dn18Zs__q8Srd2pnLT9FcnqA?..." class="btn btn-line">
                <span class="icon">⚔️</span> ギルドに入会する（LINE）
            </a>

            <a href="https://note.com/hecchaland/n/n5940073d81e6" class="btn btn-note">
                <span class="icon">📖</span> ギルドの書庫（note）を読む
            </a>
        </div>
    </div>
</div>

</body>
</html>
