<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>へっちゃらギルドへようこそ！ - へっちゃらギルド</title>
    <style>
        body {
            background-color: #f4ece1; 
            color: #5d4037;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #fffaf0;
            border: 8px double #d7ccc8;
            border-radius: 15px;
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .receptionist-img {
            max-width: 120px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 3px solid #d7ccc8;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 25px;
            color: #795548;
            border-bottom: 2px solid #efebe9;
            padding-bottom: 10px;
        }
        .description {
            text-align: left;
            line-height: 1.8;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            display: block;
            padding: 15px 20px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            font-size: 1rem;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }
        .btn-line { background-color: #795548; color: #ffffff !important; }
        .btn-note { background-color: #d7ccc8; color: #5d4037 !important; }
    </style>
</head>
<body>

<div class="container">
    <img src="guild_receptionist.jpg" alt="ギルド受付嬢" class="receptionist-img">
    
    <h1>へっちゃらギルドへようこそ！</h1>

    <div class="description">
        こちらのオープンチャットでは<br><br>
        ・ギルドマスター・へちゃぷりんの有料noteの一部を限定公開<br>

        ・「へっちゃらんど」の最新イベント情報<br><br>
        などなど限定情報を配信中！<br><br>
        私たちと一緒に、インプロの世界を冒険しましょう！
    </div>

    <div class="button-group">
        <a href="https://line.me/ti/g2/wDFzdXAqOzG_H0Dn18Zs__q8Srd2pnLT9FcnqA?utm_source=invitation&utm_medium=link_copy&utm_campaign=default" class="btn btn-line">
            早速オープンチャットに入る
        </a>
        <a href="https://note.com/hecchaland/n/n5940073d81e6" class="btn btn-note">
            ギルドコモンズを読む
        </a>
    </div>
</div>

</body>
</html>
